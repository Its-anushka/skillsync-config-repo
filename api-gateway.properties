server.port=7070
spring.application.name=api-gateway

# Eureka
eureka.client.serviceUrl.defaultZone=http://eureka-server:8761/eureka/
eureka.instance.preferIpAddress=true

# Discovery locator (keep for general routing)
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# Global CORS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOrigins=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods[0]=GET
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods[1]=POST
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods[2]=PUT
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods[3]=DELETE
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods[4]=OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*

# Explicit routes for api-docs WITH StripPrefix
spring.cloud.gateway.routes[0].id=user-service-docs
spring.cloud.gateway.routes[0].uri=lb://user-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/user-service/v3/api-docs
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=1

spring.cloud.gateway.routes[1].id=group-service-docs
spring.cloud.gateway.routes[1].uri=lb://group-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/group-service/v3/api-docs
spring.cloud.gateway.routes[1].filters[0]=StripPrefix=1

spring.cloud.gateway.routes[2].id=auth-service-docs
spring.cloud.gateway.routes[2].uri=lb://auth-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/auth-service/v3/api-docs
spring.cloud.gateway.routes[2].filters[0]=StripPrefix=1

spring.cloud.gateway.routes[3].id=mentor-service-docs
spring.cloud.gateway.routes[3].uri=lb://mentor-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/mentor-service/v3/api-docs
spring.cloud.gateway.routes[3].filters[0]=StripPrefix=1

spring.cloud.gateway.routes[4].id=notification-service-docs
spring.cloud.gateway.routes[4].uri=lb://notification-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/notification-service/v3/api-docs
spring.cloud.gateway.routes[4].filters[0]=StripPrefix=1

spring.cloud.gateway.routes[5].id=review-service-docs
spring.cloud.gateway.routes[5].uri=lb://review-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/review-service/v3/api-docs
spring.cloud.gateway.routes[5].filters[0]=StripPrefix=1

spring.cloud.gateway.routes[6].id=skill-service-docs
spring.cloud.gateway.routes[6].uri=lb://skill-service
spring.cloud.gateway.routes[6].predicates[0]=Path=/skill-service/v3/api-docs
spring.cloud.gateway.routes[6].filters[0]=StripPrefix=1

# Swagger UI — ONLY these, no duplicates
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.use-root-path=true
springdoc.swagger-ui.urls[0].name=user-service
springdoc.swagger-ui.urls[0].url=/user-service/v3/api-docs
springdoc.swagger-ui.urls[1].name=group-service
springdoc.swagger-ui.urls[1].url=/group-service/v3/api-docs
springdoc.swagger-ui.urls[2].name=auth-service
springdoc.swagger-ui.urls[2].url=/auth-service/v3/api-docs
springdoc.swagger-ui.urls[3].name=mentor-service
springdoc.swagger-ui.urls[3].url=/mentor-service/v3/api-docs
springdoc.swagger-ui.urls[4].name=notification-service
springdoc.swagger-ui.urls[4].url=/notification-service/v3/api-docs
springdoc.swagger-ui.urls[5].name=review-service
springdoc.swagger-ui.urls[5].url=/review-service/v3/api-docs
springdoc.swagger-ui.urls[6].name=skill-service
springdoc.swagger-ui.urls[6].url=/skill-service/v3/api-docs
