server.port=7070

spring.application.name=api-gateway

spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# Global CORS Configuration
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOrigins=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods[0]=GET
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods[1]=POST
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods[2]=PUT
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods[3]=DELETE
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods[4]=OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*

eureka.client.serviceUrl.defaultZone=http://eureka-server:8761/eureka/
eureka.instance.preferIpAddress=true

# Swagger UI Config
# USER SERVICE
spring.cloud.gateway.routes[0].id=user-service
spring.cloud.gateway.routes[0].uri=lb://user-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/user-service/**
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=1

# GROUP SERVICE
spring.cloud.gateway.routes[1].id=group-service
spring.cloud.gateway.routes[1].uri=lb://group-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/group-service/**
spring.cloud.gateway.routes[1].filters[0]=StripPrefix=1

# SESSION SERVICE
spring.cloud.gateway.routes[2].id=session-service
spring.cloud.gateway.routes[2].uri=lb://session-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/session-service/**
spring.cloud.gateway.routes[2].filters[0]=StripPrefix=1

# SKILL SERVICE
spring.cloud.gateway.routes[3].id=skill-service
spring.cloud.gateway.routes[3].uri=lb://skill-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/skill-service/**
spring.cloud.gateway.routes[3].filters[0]=StripPrefix=1

# AUTH SERVICE
spring.cloud.gateway.routes[4].id=authentication-service
spring.cloud.gateway.routes[4].uri=lb://authentication-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/authentication-service/**
spring.cloud.gateway.routes[4].filters[0]=StripPrefix=1

# NOTIFICATION SERVICE
spring.cloud.gateway.routes[5].id=notification-service
spring.cloud.gateway.routes[5].uri=lb://notification-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/notification-service/**
spring.cloud.gateway.routes[5].filters[0]=StripPrefix=1

# REVIEW SERVICE
spring.cloud.gateway.routes[6].id=review-service
spring.cloud.gateway.routes[6].uri=lb://review-service
spring.cloud.gateway.routes[6].predicates[0]=Path=/review-service/**
spring.cloud.gateway.routes[6].filters[0]=StripPrefix=1

# MENTOR SERVICE
spring.cloud.gateway.routes[7].id=mentor-service
spring.cloud.gateway.routes[7].uri=lb://mentor-service
spring.cloud.gateway.routes[7].predicates[0]=Path=/mentor-service/**
spring.cloud.gateway.routes[7].filters[0]=StripPrefix=1
springdoc.swagger-ui.path=/swagger-ui.html

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true


