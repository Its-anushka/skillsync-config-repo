server.port=7070
spring.application.name=api-gateway

# Eureka
eureka.client.serviceUrl.defaultZone=http://eureka-server:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.preferIpAddress=true

# Discovery Locator
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# Forward headers (needed for correct Swagger server URL)
server.forward-headers-strategy=framework

# Global CORS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origins=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers=*

# Springdoc / Swagger
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.urls[0].name=user-service
springdoc.swagger-ui.urls[0].url=/user-service/v3/api-docs
springdoc.swagger-ui.urls[1].name=group-service
springdoc.swagger-ui.urls[1].url=/group-service/v3/api-docs
springdoc.swagger-ui.urls[2].name=authentication-service
springdoc.swagger-ui.urls[2].url=/authentication-service/v3/api-docs
springdoc.swagger-ui.urls[3].name=mentor-service
springdoc.swagger-ui.urls[3].url=/mentor-service/v3/api-docs
springdoc.swagger-ui.urls[4].name=notification-service
springdoc.swagger-ui.urls[4].url=/notification-service/v3/api-docs
springdoc.swagger-ui.urls[5].name=review-service
springdoc.swagger-ui.urls[5].url=/review-service/v3/api-docs
springdoc.swagger-ui.urls[6].name=skill-service
springdoc.swagger-ui.urls[6].url=/skill-service/v3/api-docs

# Actuator
management.endpoints.web.exposure.include=*
